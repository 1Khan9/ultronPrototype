<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self'; img-src 'self' data:">
<meta name="referrer" content="no-referrer">
<title>Ultron Overlay</title>
<style>
  /* Animation is CSS transform/opacity ONLY (style-src allows 'unsafe-inline'
     style). The single inline renderer <script> is permitted via script-src
     'self' 'unsafe-inline'; it uses textContent only (no markup-setting sink) and
     no inline event-handler attributes, so the injection surface is unchanged. */
  :root { color-scheme: dark; }
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: transparent; overflow: hidden;
    font-family: "Segoe UI", system-ui, sans-serif; color: #e8e8ff;
    -webkit-font-smoothing: antialiased;
  }
  #stage { position: fixed; inset: 0; pointer-events: none; }

  /* --- spinning wheel ---------------------------------------------------- */
  #wheel-wrap {
    position: absolute; top: 50%; left: 50%;
    width: 320px; height: 320px; margin: -160px 0 0 -160px;
    opacity: 0; transition: opacity 400ms ease;
  }
  #wheel-wrap.show { opacity: 1; }
  #wheel {
    width: 100%; height: 100%; border-radius: 50%;
    border: 6px solid rgba(120,140,255,0.55);
    background:
      conic-gradient(from 0deg,
        #2b2f55 0deg 45deg, #3a3f73 45deg 90deg,
        #2b2f55 90deg 135deg, #3a3f73 135deg 180deg,
        #2b2f55 180deg 225deg, #3a3f73 225deg 270deg,
        #2b2f55 270deg 315deg, #3a3f73 315deg 360deg);
    box-shadow: 0 0 40px rgba(80,100,255,0.45);
    transform: rotate(0deg);
    /* per-spin duration overridden via the --spin-ms custom property (set with
       element.style.setProperty in script — a property write, never markup). */
    transition: transform var(--spin-ms, 4000ms) cubic-bezier(0.12, 0.7, 0.12, 1);
  }
  #wheel-pointer {
    position: absolute; top: -14px; left: 50%; margin-left: -12px;
    width: 0; height: 0;
    border-left: 12px solid transparent; border-right: 12px solid transparent;
    border-top: 22px solid #ffd166;
  }
  #wheel-label {
    position: absolute; top: 340px; left: 50%; transform: translateX(-50%);
    white-space: nowrap; font-size: 28px; font-weight: 700;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
  }

  /* --- alert toast ------------------------------------------------------- */
  #alert {
    position: absolute; top: 48px; left: 50%; transform: translate(-50%, -24px);
    min-width: 320px; max-width: 60%; padding: 18px 28px;
    background: rgba(20,22,48,0.92); border: 1px solid rgba(120,140,255,0.6);
    border-radius: 14px; box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    opacity: 0; transition: opacity 350ms ease, transform 350ms ease;
  }
  #alert.show { opacity: 1; transform: translate(-50%, 0); }
  #alert-title { font-size: 24px; font-weight: 800; color: #aab4ff; }
  #alert-body  { font-size: 18px; margin-top: 6px; color: #e8e8ff; }

  /* --- points ticker ----------------------------------------------------- */
  #ticker {
    position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%);
    padding: 10px 22px; background: rgba(20,22,48,0.88);
    border: 1px solid rgba(120,140,255,0.5); border-radius: 999px;
    font-size: 20px; font-weight: 700; letter-spacing: 0.3px;
    opacity: 0; transition: opacity 300ms ease;
  }
  #ticker.show { opacity: 1; }
  #ticker-label { color: #aab4ff; }
  #ticker-points { color: #8effc1; margin-left: 10px; }

  /* ====================================================================== */
  /* CHAT-GAME CARDS — bottom-left, condensed, never over the crosshair.    */
  /* Production look: glassy dark glass, Valorant-red (#ff4655) accent, cold */
  /* angular Ultron machine aesthetic. GPU-light: transform/opacity only.    */
  /* ====================================================================== */
  :root {
    --val-red: #ff4655;
    --val-red-dim: #d63a47;
    --win: #43e0a0;
    --loss: #ff4655;
    --card-bg: rgba(13, 16, 28, 0.82);
    --card-bg-2: rgba(18, 22, 38, 0.72);
    --hairline: rgba(255, 255, 255, 0.10);
    --ink: #eef1ff;
    --ink-dim: #9aa3c4;
  }

  /* Anchored to the LOWER-LEFT quarter. Cards stack UPWARD (column-reverse) so
     the newest sits at the bottom and older ones rise + fade. pointer-events
     none so it never eats OBS interactions. */
  #chat-games {
    position: fixed; left: 24px; bottom: 24px;
    width: 360px; max-width: 32vw;
    display: flex; flex-direction: column-reverse; gap: 10px;
    pointer-events: none; z-index: 50;
    font-family: "Segoe UI Semibold", "Segoe UI", system-ui, sans-serif;
  }

  .cg-card {
    position: relative; overflow: hidden;
    background: linear-gradient(160deg, var(--card-bg) 0%, var(--card-bg-2) 100%);
    -webkit-backdrop-filter: blur(9px) saturate(1.1);
    backdrop-filter: blur(9px) saturate(1.1);
    border: 1px solid var(--hairline);
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.55), 0 1px 0 rgba(255,255,255,0.04) inset;
    padding: 12px 14px 12px 16px;
    /* sharp angular Valorant cut on the top-right corner */
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 0 100%);
    color: var(--ink);
    transform: translateX(-118%);
    opacity: 0;
    will-change: transform, opacity;
    transition: transform 420ms cubic-bezier(0.16, 0.84, 0.24, 1), opacity 360ms ease;
  }
  .cg-card.cg-in  { transform: translateX(0); opacity: 1; }
  .cg-card.cg-out { transform: translateX(-12%); opacity: 0;
                    transition: transform 480ms ease, opacity 480ms ease; }

  /* left accent rail — red default, recolored to win/loss by a modifier */
  .cg-card::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
    background: var(--val-red);
    box-shadow: 0 0 14px var(--val-red);
  }
  .cg-card.cg-win::before  { background: var(--win);  box-shadow: 0 0 14px var(--win); }
  .cg-card.cg-loss::before { background: var(--loss); box-shadow: 0 0 14px var(--loss); }

  .cg-head {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; letter-spacing: 1.4px; text-transform: uppercase;
    color: var(--ink-dim); font-weight: 700;
  }
  .cg-badge {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 20px; height: 20px; padding: 0 5px;
    border-radius: 4px; background: rgba(255, 70, 85, 0.16);
    border: 1px solid rgba(255, 70, 85, 0.45);
    color: var(--val-red); font-size: 13px; line-height: 1;
  }
  .cg-game { color: var(--ink); letter-spacing: 2px; }
  .cg-tag {
    margin-left: auto; font-size: 10px; letter-spacing: 1px;
    color: var(--ink-dim); opacity: 0.7;
  }

  .cg-body { margin-top: 9px; display: flex; align-items: center; gap: 12px; }
  .cg-main { min-width: 0; flex: 1; }
  .cg-viewer {
    font-size: 16px; font-weight: 800; color: var(--ink);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    letter-spacing: 0.2px;
  }
  .cg-outcome {
    margin-top: 2px; font-size: 13px; color: var(--ink-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .cg-amount {
    flex: none; text-align: right; font-weight: 800; font-size: 19px;
    line-height: 1; letter-spacing: 0.3px;
    font-variant-numeric: tabular-nums; color: var(--win);
  }
  .cg-card.cg-loss .cg-amount { color: var(--loss); }
  .cg-amount .cg-amt-unit { display: block; font-size: 9px; font-weight: 600;
    letter-spacing: 1px; color: var(--ink-dim); margin-top: 3px; text-transform: uppercase; }

  /* --- slots reels: BIG reels that spin ~3s then LAND on the real symbols --- */
  /* A wide slots card so the three reels read clearly on stream. The slots card
     is given the .cg-card-slots modifier which widens it + stacks the reels above
     the viewer/amount line. */
  .cg-card.cg-card-slots { width: 420px; max-width: 40vw; }
  .cg-card-slots .cg-body { flex-direction: column; align-items: stretch; gap: 12px; }
  .cg-reels { display: flex; gap: 12px; justify-content: center; }
  .cg-reel {
    width: 96px; height: 116px; border-radius: 12px;
    background: radial-gradient(120% 120% at 50% 0%, rgba(40,46,82,0.6) 0%, rgba(0,0,0,0.5) 100%);
    border: 2px solid var(--hairline);
    overflow: hidden; position: relative;
    box-shadow: 0 4px 14px rgba(0,0,0,0.5) inset, 0 1px 0 rgba(255,255,255,0.05);
  }
  /* a subtle center pay-line so the eye knows where the symbol settles */
  .cg-reel::after {
    content: ""; position: absolute; left: 0; right: 0; top: 50%; height: 2px;
    margin-top: -1px; background: rgba(255, 70, 85, 0.35); pointer-events: none;
  }
  .cg-reel-strip {
    position: absolute; left: 0; right: 0; top: 0;
    display: flex; flex-direction: column; align-items: center;
    /* the strip is pre-stacked with many filler glyphs + the final glyph last; a
       transform slide settles it on the final cell. Per-reel duration set in JS so
       the LAST reel finishes at ~3s (staggered, decelerating). */
    transform: translateY(0);
    transition: transform var(--reel-ms, 3000ms) cubic-bezier(0.12, 0.62, 0.12, 1);
  }
  .cg-reel-cell {
    width: 96px; height: 116px; display: flex; align-items: center;
    justify-content: center; font-size: 64px; line-height: 1;
  }
  .cg-card.cg-win .cg-reel { border-color: rgba(67, 224, 160, 0.65);
    box-shadow: 0 0 18px rgba(67,224,160,0.35), 0 4px 14px rgba(0,0,0,0.5) inset; }

  /* ====================================================================== */
  /* BIG SPINNING WHEEL CARD — dominant, readable wheel that spins ~3s then  */
  /* decelerates + LANDS on the outcome wedge; the earned amount is revealed */
  /* ON the landed wedge under the pointer.                                  */
  /* ====================================================================== */
  .cg-card.cg-card-wheel { width: 440px; max-width: 46vw; }
  .cg-card-wheel .cg-body { flex-direction: column; align-items: center; gap: 10px; }

  /* The wheel stage: a big square holding the rotating disc + a fixed pointer + a
     fixed center hub. The disc rotates; the pointer/hub/amount stay put. */
  .cg-bigwheel {
    position: relative; width: 300px; height: 300px; margin: 4px auto 2px;
  }
  .cg-bigwheel-disc {
    position: absolute; inset: 0; border-radius: 50%;
    border: 5px solid rgba(120,140,255,0.45);
    box-shadow: 0 0 36px rgba(80,100,255,0.4), 0 0 0 3px rgba(0,0,0,0.5) inset;
    /* conic-gradient wedges are painted in JS via setProperty('background', ...)
       so the slice count matches the live segment list; transform spins it. */
    transform: rotate(0deg);
    /* ~3s decelerating spin; duration set per-spin via --bigwheel-ms. */
    transition: transform var(--bigwheel-ms, 3000ms) cubic-bezier(0.10, 0.55, 0.10, 1);
  }
  /* per-wedge labels are absolutely positioned children of the disc (so they spin
     WITH it); each is rotated to its wedge center + pushed to the rim. */
  .cg-bigwheel-seg {
    position: absolute; top: 50%; left: 50%; width: 50%; height: 22px;
    margin-top: -11px; transform-origin: 0 50%;
    display: flex; align-items: center; justify-content: flex-end;
    padding-right: 16px; box-sizing: border-box;
    font-size: 14px; font-weight: 800; letter-spacing: 0.3px; color: #fff;
    text-shadow: 0 1px 4px rgba(0,0,0,0.85); white-space: nowrap;
    pointer-events: none;
  }
  /* fixed pointer at the TOP (12 o'clock) — the wedge under it is the winner. */
  .cg-bigwheel-pointer {
    position: absolute; top: -10px; left: 50%; margin-left: -15px; z-index: 3;
    width: 0; height: 0;
    border-left: 15px solid transparent; border-right: 15px solid transparent;
    border-top: 26px solid #ffd166;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.7));
  }
  /* fixed center hub that the landed amount is revealed inside. */
  .cg-bigwheel-hub {
    position: absolute; top: 50%; left: 50%; z-index: 4;
    width: 110px; height: 110px; margin: -55px 0 0 -55px; border-radius: 50%;
    background: radial-gradient(circle at 50% 38%, rgba(28,32,58,0.96), rgba(10,12,24,0.96));
    border: 3px solid rgba(120,140,255,0.5);
    box-shadow: 0 6px 20px rgba(0,0,0,0.6);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 320ms ease;
  }
  .cg-bigwheel-hub.cg-landed { opacity: 1; }
  .cg-card.cg-win  .cg-bigwheel-hub { border-color: rgba(67,224,160,0.6);
    box-shadow: 0 0 24px rgba(67,224,160,0.4), 0 6px 20px rgba(0,0,0,0.6); }
  .cg-card.cg-loss .cg-bigwheel-hub { border-color: rgba(255,70,85,0.6); }
  .cg-bigwheel-amount {
    font-size: 38px; font-weight: 900; line-height: 1; letter-spacing: 0.3px;
    font-variant-numeric: tabular-nums; color: var(--win);
  }
  .cg-card.cg-loss .cg-bigwheel-amount { color: var(--loss); }
  .cg-bigwheel-amount-unit {
    margin-top: 5px; font-size: 11px; font-weight: 700; letter-spacing: 1.5px;
    color: var(--ink-dim); text-transform: uppercase;
  }
  /* the landed segment label shown under the wheel (mirrors the wedge it stopped on) */
  .cg-bigwheel-foot {
    text-align: center; font-size: 15px; font-weight: 800; color: var(--ink);
    letter-spacing: 0.4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    max-width: 100%;
  }
  .cg-bigwheel-foot .cg-bigwheel-foot-seg { color: #ffd166; }

  /* legacy compact wheel reveal (kept for back-compat; no longer the primary). */
  .cg-wheel {
    display: flex; align-items: center; gap: 9px;
  }
  .cg-seg {
    font-size: 15px; font-weight: 800; color: var(--ink); letter-spacing: 0.4px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* --- result icon chip (heist/duel/trivia/raffle) ------------------------ */
  .cg-icon {
    flex: none; width: 38px; height: 38px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center; font-size: 20px;
    background: rgba(255, 70, 85, 0.12);
    border: 1px solid rgba(255, 70, 85, 0.4);
  }
  .cg-card.cg-win .cg-icon  { background: rgba(67,224,160,0.12); border-color: rgba(67,224,160,0.45); }
  .cg-card.cg-loss .cg-icon { background: rgba(255,70,85,0.14); border-color: rgba(255,70,85,0.5); }

  .cg-sub {
    margin-top: 7px; font-size: 11px; color: var(--ink-dim);
    letter-spacing: 0.3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  /* ====================================================================== */
  /* RESULT-CARD SUSPENSE — heist/duel/raffle/trivia play out for ~3s then  */
  /* SETTLE on the real outcome from the event (winner / amount / detail),  */
  /* so the card lands exactly as the server announces. The "playing out"   */
  /* phase is .cg-suspense; settling adds .cg-settled (a small flag flip in  */
  /* JS at SPIN_MS) which stops the animation + reveals the true result.     */
  /* ====================================================================== */
  .cg-card.cg-suspense .cg-icon { animation: cg-suspense-pulse 700ms ease-in-out infinite; }
  @keyframes cg-suspense-pulse {
    0%, 100% { transform: scale(1);    filter: none; }
    50%      { transform: scale(1.16); filter: brightness(1.5); }
  }
  /* the rolling "playing out" line: a faint scan shimmer while undecided. */
  .cg-roll {
    margin-top: 2px; font-size: 13px; color: var(--ink-dim);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    position: relative;
  }
  .cg-card.cg-suspense .cg-roll {
    background: linear-gradient(90deg, transparent 0%, rgba(255,70,85,0.18) 50%, transparent 100%);
    background-size: 200% 100%;
    animation: cg-roll-scan 1100ms linear infinite;
  }
  @keyframes cg-roll-scan { from { background-position: 200% 0; } to { background-position: -200% 0; } }
  /* the amount + outcome reveal — hidden until settle, then fades in. */
  .cg-card .cg-reveal { opacity: 0; transition: opacity 320ms ease; }
  .cg-card.cg-settled .cg-reveal { opacity: 1; }
  /* a duel shows the two combatants tug back and forth, then the loser dims. */
  .cg-duel { display: flex; align-items: center; gap: 6px; font-size: 12px; }
  .cg-duel-side { font-weight: 800; color: var(--ink); transition: opacity 300ms ease, color 300ms ease; }
  .cg-duel-vs { color: var(--ink-dim); font-size: 10px; letter-spacing: 1px; }
  .cg-card.cg-suspense .cg-duel-side { animation: cg-duel-flicker 800ms ease-in-out infinite alternate; }
  @keyframes cg-duel-flicker { from { opacity: 0.5; } to { opacity: 1; } }
  .cg-duel-side.cg-duel-lost  { opacity: 0.35; color: var(--ink-dim); text-decoration: line-through; }
  .cg-duel-side.cg-duel-won   { color: var(--win); }

  /* --- speech card (a SPEAK redeem: viewer + quote, team variant tinted) --- */
  .cg-quote {
    margin-top: 8px; font-size: 14px; line-height: 1.32; color: var(--ink);
    /* clamp to 3 lines so a long message never grows the card unbounded */
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .cg-card.cg-speech .cg-icon { font-size: 18px; }
  .cg-card.cg-team::before { background: #6c8cff; box-shadow: 0 0 14px #6c8cff; }
  .cg-card.cg-team .cg-icon {
    background: rgba(108, 140, 255, 0.14); border-color: rgba(108, 140, 255, 0.5);
  }
</style>
</head>
<body>
<div id="stage">
  <div id="wheel-wrap">
    <div id="wheel-pointer"></div>
    <div id="wheel"></div>
    <div id="wheel-label"></div>
  </div>

  <div id="alert">
    <div id="alert-title"></div>
    <div id="alert-body"></div>
  </div>

  <div id="ticker">
    <span id="ticker-label"></span>
    <span id="ticker-points"></span>
  </div>

  <!-- Chat-command game cards: anchored bottom-left, stack upward, auto-dismiss.
       Built entirely via createElement + textContent in script (markup-setting
       sinks are never used), so a hostile chatter name is inert literal text. -->
  <div id="chat-games"></div>
</div>

<!--
  DUMB RENDERER. This page never decides an outcome: the server's crypto RNG
  picks the wheel winner FIRST and sends the target angle; we only animate to it.
  Every dynamic value is written with textContent so a hostile display name is
  rendered as inert literal text rather than parsed as markup. There are NO
  inline DOM event-handler attributes; the EventSource handlers are attached via
  addEventListener below. The connect-src 'self' CSP directive is what permits
  the EventSource subscription. The token is read from this document's own URL
  (window.location.search).
-->
<script>
(function () {
  "use strict";

  // --- element handles ----------------------------------------------------
  var wheelWrap   = document.getElementById("wheel-wrap");
  var wheelEl     = document.getElementById("wheel");
  var wheelLabel  = document.getElementById("wheel-label");
  var alertEl     = document.getElementById("alert");
  var alertTitle  = document.getElementById("alert-title");
  var alertBody   = document.getElementById("alert-body");
  var tickerEl    = document.getElementById("ticker");
  var tickerLabel = document.getElementById("ticker-label");
  var tickerPts   = document.getElementById("ticker-points");

  var chatGamesEl = document.getElementById("chat-games");

  var alertTimer  = null;
  var wheelTurns  = 0; // accumulate full turns so each spin rotates forward

  // Chat-game card queue config: cap the visible stack so the corner never
  // floods; the OLDEST is dismissed first when over the cap.
  var CG_MAX_VISIBLE = 3;
  var CG_HOLD_MS = 7000;      // default per-card on-screen hold before auto-dismiss
  var CG_OUT_MS  = 520;       // must exceed the .cg-out CSS transition
  var cgCards = [];            // live card records { el, hideTimer, removeTimer }

  // setText: the ONLY way dynamic strings reach the DOM. textContent escapes
  // everything; markup-setting sinks are deliberately never used.
  function setText(el, value) {
    el.textContent = (value === undefined || value === null) ? "" : String(value);
  }

  // makeEl: small createElement helper (className + optional text). Never parses
  // markup — only textContent is ever set (the security tests assert no
  // markup-setting sink appears anywhere in this page).
  function makeEl(tag, cls, text) {
    var el = document.createElement(tag);
    if (cls) { el.className = cls; }
    if (text !== undefined && text !== null && text !== "") { el.textContent = String(text); }
    return el;
  }

  function num(value, fallback) {
    var n = Number(value);
    return isFinite(n) ? n : fallback;
  }

  // --- renderers (pure: data in -> DOM text/transform out) -----------------
  function renderWheel(ev) {
    var angle = num(ev.angle, 0);
    var dur   = num(ev.duration_ms, 4000);
    setText(wheelLabel, ""); // clear until the spin lands
    wheelWrap.classList.add("show");
    // Always rotate FORWARD past several whole turns, then settle on `angle`.
    wheelTurns += 5;
    var target = wheelTurns * 360 + angle;
    wheelEl.style.setProperty("--spin-ms", Math.max(0, dur) + "ms");
    // Force a reflow read so the transition re-triggers reliably.
    void wheelEl.offsetWidth;
    wheelEl.style.transform = "rotate(" + target + "deg)";
    window.setTimeout(function () {
      setText(wheelLabel, ev.label);
    }, Math.max(0, dur));
  }

  function renderAlert(ev) {
    setText(alertTitle, ev.title);
    setText(alertBody, ev.body);
    alertEl.classList.add("show");
    if (alertTimer) { window.clearTimeout(alertTimer); }
    var dur = num(ev.duration_ms, 6000);
    alertTimer = window.setTimeout(function () {
      alertEl.classList.remove("show");
    }, Math.max(0, dur));
  }

  function renderTicker(ev) {
    setText(tickerLabel, ev.label);
    setText(tickerPts, ev.points);
    tickerEl.classList.add("show");
  }

  // --- chat-game cards (bottom-left, game-accurate, auto-dismiss) ----------
  var CG_ICON = { heist: "💰", duel: "⚔", trivia: "❓", raffle: "🎟", wheel: "◉", slots: "🎰" };
  var SLOT_GLYPH = {
    cherry: "🍒", lemon: "🍋", bell: "🔔",
    star: "⭐", seven: "7️⃣", skull: "💀"
  };
  var SLOT_FILLERS = ["🍒", "🍋", "🔔", "⭐", "7️⃣", "💀"];

  function slotGlyph(sym) {
    if (sym === undefined || sym === null) { return "❔"; }
    var key = String(sym).toLowerCase();
    return SLOT_GLYPH[key] || String(sym).slice(0, 2);
  }

  function fmtAmount(n) {
    var v = num(n, 0);
    var s = (v > 0 ? "+" : "") + Math.round(v);
    return s;
  }

  // ~3s spin window for BOTH slots + wheel: the server emits the overlay FIRST,
  // waits ~3s, THEN announces. The reels/wheel must finish at ~SPIN_MS so the
  // land lines up with the spoken result.
  var SPIN_MS = 3000;          // total spin window (slot last reel / wheel disc)
  var REEL_CELL_PX = 116;      // must equal .cg-reel-cell height in the CSS
  var REEL_PRESTACK = 24;      // tall filler stack so the spin reads as a real blur

  // Build the slots card body: three BIG reels that spin for ~3s then land,
  // staggered (left reel lands first), settling on the ACTUAL pulled symbols.
  // Pure CSS transform — no JS animation loop. The amount reveals after the LAST
  // reel lands (handed back via onLanded so the card can flip win/loss color too).
  function buildSlotsBody(ev, detail, onLanded) {
    var body = makeEl("div", "cg-body");
    var reels = makeEl("div", "cg-reels");
    var symbols = (detail.reels && detail.reels.length) ? detail.reels : ["star", "star", "star"];
    var n = Math.min(symbols.length, 3);
    if (n < 1) { n = 1; }
    var lastReelMs = SPIN_MS;
    for (var i = 0; i < n; i++) {
      var reel = makeEl("div", "cg-reel");
      var strip = makeEl("div", "cg-reel-strip");
      // pre-stack many filler glyphs (a tall blur), with the FINAL real symbol
      // last; sliding the strip up by `pre` cells settles on that final cell.
      var pre = REEL_PRESTACK;
      for (var f = 0; f < pre; f++) {
        strip.appendChild(makeEl("div", "cg-reel-cell", SLOT_FILLERS[(i * 3 + f) % SLOT_FILLERS.length]));
      }
      strip.appendChild(makeEl("div", "cg-reel-cell", slotGlyph(symbols[i])));
      // Staggered land: reel 0 finishes earlier, the LAST reel finishes at SPIN_MS
      // so the whole spin reads as ~3s. Each reel still spins the full tall stack.
      var ms = SPIN_MS - (n - 1 - i) * 360;
      if (i === n - 1) { lastReelMs = ms; }
      strip.style.setProperty("--reel-ms", ms + "ms");
      reel.appendChild(strip);
      reels.appendChild(reel);
      // kick the slide on the next frame so the transition runs.
      (function (s, offset) {
        window.requestAnimationFrame(function () {
          window.requestAnimationFrame(function () { s.style.transform = "translateY(-" + offset + "px)"; });
        });
      })(strip, pre * REEL_CELL_PX);
    }
    body.appendChild(reels);
    var main = makeEl("div", "cg-main");
    main.appendChild(makeEl("div", "cg-viewer", ev.viewer));
    var outcome = makeEl("div", "cg-outcome", "spinning…");
    main.appendChild(outcome);
    body.appendChild(main);
    var amount = buildAmount(ev);
    amount.style.opacity = "0";
    amount.style.transition = "opacity 300ms ease";
    body.appendChild(amount);
    // After the last reel lands, reveal the outcome text + amount together.
    window.setTimeout(function () {
      setText(outcome, ev.won ? "Triple " + slotGlyph(detail.win_symbol) + " — jackpot" : "No match");
      amount.style.opacity = "1";
      if (typeof onLanded === "function") { onLanded(); }
    }, Math.max(0, lastReelMs));
    return body;
  }

  // Canonical wheel face. The live event only tells us the LANDED segment
  // (detail.segment / ev.outcome), not the full slice list, so we render a fixed
  // readable face and land the pointer on the wedge that matches. If the landed
  // label isn't one of these, we substitute it into a neutral slot so the pointer
  // still stops on the real outcome text.
  var WHEEL_FACE = [
    { label: "JACKPOT 1000", color: "#ffd166" },
    { label: "BUST",         color: "#3a2030" },
    { label: "DOUBLE",       color: "#43e0a0" },
    { label: "SMALL WIN",    color: "#2c3a73" },
    { label: "TRIPLE",       color: "#6c8cff" },
    { label: "NOTHING",      color: "#23263f" },
    { label: "BIG WIN",      color: "#ff4655" },
    { label: "HALF BACK",    color: "#3a3f73" }
  ];

  function norm(s) { return String(s === undefined || s === null ? "" : s).trim().toUpperCase(); }

  // Build the conic-gradient + place the rotating segment labels; return the
  // wedge index that matches `landed` (or the slot we substituted it into).
  function paintWheelFace(disc, landed) {
    var face = WHEEL_FACE.slice();
    var want = norm(landed);
    var idx = -1;
    for (var i = 0; i < face.length; i++) {
      if (norm(face[i].label) === want) { idx = i; break; }
    }
    if (idx < 0 && want) {
      // landed label isn't on the canonical face — drop it into a neutral wedge so
      // the pointer still stops on the true outcome string.
      idx = 5; // the "NOTHING" slot, recolored below to read as the real outcome
      face[idx] = { label: landed, color: "#2c3a73" };
    }
    if (idx < 0) { idx = 0; }
    var n = face.length;
    var per = 360 / n;
    // conic-gradient stops, wedge i spanning [i*per, (i+1)*per).
    var stops = [];
    for (var j = 0; j < n; j++) {
      stops.push(face[j].color + " " + (j * per).toFixed(3) + "deg " + ((j + 1) * per).toFixed(3) + "deg");
    }
    disc.style.setProperty("background", "conic-gradient(from 0deg, " + stops.join(", ") + ")");
    // place each label rotated to its wedge CENTER, anchored at the disc center,
    // pushed to the rim (the .cg-bigwheel-seg is a half-width bar from center out).
    // The conic-gradient measures angles clockwise from 12 o'clock (North); a CSS
    // rotate(0) points East (3 o'clock), so subtract 90deg to align the label with
    // the same wedge the gradient painted.
    for (var k = 0; k < n; k++) {
      var seg = makeEl("div", "cg-bigwheel-seg", face[k].label);
      var center = (k + 0.5) * per;        // degrees, clockwise from 12 o'clock(0)
      seg.style.transform = "rotate(" + (center - 90) + "deg)";
      disc.appendChild(seg);
    }
    return { idx: idx, per: per, label: face[idx].label };
  }

  // Big spinning wheel: paints the face, then on the next frames spins forward
  // several whole turns + decelerates over ~SPIN_MS, LANDING the matched wedge
  // under the top pointer. After it lands, the earned amount is revealed on the
  // center hub (over the landed wedge) and the win/loss color is applied.
  function buildWheelBody(ev, detail, onLanded) {
    var landed = detail.segment || ev.outcome;
    var body = makeEl("div", "cg-body");

    var stage = makeEl("div", "cg-bigwheel");
    stage.appendChild(makeEl("div", "cg-bigwheel-pointer"));
    var disc = makeEl("div", "cg-bigwheel-disc");
    var placed = paintWheelFace(disc, landed);
    stage.appendChild(disc);

    // center hub holds the earned amount, revealed only AFTER the wheel lands.
    var hub = makeEl("div", "cg-bigwheel-hub");
    var hubAmt = makeEl("div", "cg-bigwheel-amount", fmtAmount(ev.amount));
    hub.appendChild(hubAmt);
    hub.appendChild(makeEl("div", "cg-bigwheel-amount-unit", "taps"));
    stage.appendChild(hub);
    body.appendChild(stage);

    // viewer line + (after-land) landed segment under the wheel.
    var foot = makeEl("div", "cg-bigwheel-foot");
    foot.appendChild(makeEl("span", null, (ev.viewer ? ev.viewer + " · " : "")));
    var footSeg = makeEl("span", "cg-bigwheel-foot-seg", "spinning…");
    foot.appendChild(footSeg);
    body.appendChild(foot);

    // To land wedge `idx` under the TOP pointer (12 o'clock = 0deg), the wedge
    // center must rotate to 0deg, i.e. disc rotates by -(center). Add whole turns
    // so it always spins forward, plus a tiny random jitter within the wedge so it
    // doesn't look mechanically perfect.
    var center = (placed.idx + 0.5) * placed.per;
    var jitter = (Math.random() - 0.5) * (placed.per * 0.5);
    var turns = 6;
    var target = turns * 360 - center + jitter;
    disc.style.setProperty("--bigwheel-ms", SPIN_MS + "ms");
    window.requestAnimationFrame(function () {
      window.requestAnimationFrame(function () {
        void disc.offsetWidth;                  // force a reflow so the transition runs
        disc.style.transform = "rotate(" + target + "deg)";
      });
    });

    // After the spin lands: reveal the hub amount + the landed segment text.
    window.setTimeout(function () {
      hub.classList.add("cg-landed");
      setText(footSeg, placed.label);
      if (typeof onLanded === "function") { onLanded(); }
    }, SPIN_MS);

    return body;
  }

  // The real settled sub-line for a result card, computed from the ACTUAL event
  // data (winner / loser / pot / crew / entrants / phase). This is what the card
  // shows AFTER the ~3s suspense plays out.
  function resultSettledSub(ev, detail) {
    var sub = ev.outcome;
    if (ev.game === "heist")  { sub = ev.outcome + " · pot " + (detail.pot || 0) + " · " + (detail.crew || 1) + " crew"; }
    if (ev.game === "duel")   { sub = "beat " + (detail.loser || "the house"); }
    if (ev.game === "raffle") {
      sub = (detail.phase === "open") ? "entered the raffle" : ((detail.entrants || 0) + " entered");
    }
    if (ev.game === "trivia") {
      sub = (detail.phase === "open") ? "trivia started" : "got it right";
    }
    return sub;
  }

  // The "playing out" line shown DURING the ~3s suspense, per game. An "open"
  // phase (a raffle/trivia that just opened a window) has no winner to resolve, so
  // it settles instantly on its real state rather than faking a draw.
  function resultRollText(ev, detail) {
    if (ev.game === "heist")  { return "cracking the vault…"; }
    if (ev.game === "duel")   { return "trading shots…"; }
    if (ev.game === "raffle") { return (detail.phase === "open") ? "" : "drawing a winner…"; }
    if (ev.game === "trivia") { return (detail.phase === "open") ? "" : "checking the answer…"; }
    return "resolving…";
  }

  // Generic result card (heist/duel/trivia/raffle + any future game): an icon chip
  // that PLAYS OUT for ~3s (suspense), then SETTLES on the real winner/outcome and
  // reveals the true amount — landing exactly as the server announces. A pure
  // outcome-open card (raffle/trivia just opened) has nothing to resolve, so it
  // settles immediately on its real state.
  function buildResultBody(ev, detail, onLanded) {
    var body = makeEl("div", "cg-body");
    var icon = makeEl("div", "cg-icon", CG_ICON[ev.game] || "✦");
    body.appendChild(icon);
    var main = makeEl("div", "cg-main");

    var rollText = resultRollText(ev, detail);
    var animates = rollText !== "";   // open-phase cards have no draw to play out
    var settledSub = resultSettledSub(ev, detail);
    var winnerName = detail.winner || ev.viewer;

    // DUEL gets a two-combatant resolve; everyone else gets a winner line.
    var viewerEl, subEl, duelA, duelB;
    if (ev.game === "duel" && animates) {
      // show both combatants flickering, then the loser dims + winner lights up.
      var duel = makeEl("div", "cg-duel");
      duelA = makeEl("span", "cg-duel-side", winnerName);
      duel.appendChild(duelA);
      duel.appendChild(makeEl("span", "cg-duel-vs", "VS"));
      duelB = makeEl("span", "cg-duel-side", detail.loser || "the house");
      duel.appendChild(duelB);
      main.appendChild(duel);
      subEl = makeEl("div", "cg-roll", rollText);
      main.appendChild(subEl);
    } else {
      viewerEl = makeEl("div", "cg-viewer", animates ? "…" : winnerName);
      main.appendChild(viewerEl);
      subEl = makeEl("div", animates ? "cg-roll" : "cg-outcome", animates ? rollText : settledSub);
      main.appendChild(subEl);
    }
    body.appendChild(main);

    var amount = buildAmount(ev);
    if (animates) { amount.classList.add("cg-reveal"); }   // hidden until settle
    body.appendChild(amount);

    // settle: stop the suspense + write the REAL winner/outcome from the event.
    function settle() {
      if (viewerEl) { setText(viewerEl, winnerName); }
      if (ev.game === "duel" && duelA && duelB) {
        duelA.classList.add("cg-duel-won");
        duelB.classList.add("cg-duel-lost");
      }
      // turn the rolling line into the real settled outcome line.
      subEl.className = "cg-outcome";
      setText(subEl, settledSub);
      if (typeof onLanded === "function") { onLanded(); }
    }

    if (animates) {
      window.setTimeout(settle, SPIN_MS);
    } else {
      // nothing to resolve (open phase) — it's already on its true state; still
      // notify so the caller can apply the (already-known) outcome accent.
      if (typeof onLanded === "function") { onLanded(); }
    }

    body._animates = animates;   // tells renderChatGame whether to hold for the spin
    return body;
  }

  function buildAmount(ev) {
    var amt = makeEl("div", "cg-amount", fmtAmount(ev.amount));
    amt.appendChild(makeEl("span", "cg-amt-unit", "taps"));
    return amt;
  }

  // win/loss accent applied to a card. For the SPINNING games (slots/wheel) this
  // is deferred until the spin LANDS so the color reveal lands with the result.
  function applyOutcomeClass(card, ev) {
    if (ev.won) { card.classList.add("cg-win"); }
    else if (ev.game === "heist" || ev.game === "duel" || ev.game === "slots" || ev.game === "wheel") {
      card.classList.add("cg-loss");
    }
  }

  function renderChatGame(ev) {
    if (!chatGamesEl) { return; }
    var detail = (ev.detail && typeof ev.detail === "object") ? ev.detail : {};
    var card = makeEl("div", "cg-card");
    var spinning = (ev.game === "slots" || ev.game === "wheel");
    // wider card variants for the big spinning slots / wheel so they read on stream.
    if (ev.game === "slots") { card.classList.add("cg-card-slots"); }
    else if (ev.game === "wheel") { card.classList.add("cg-card-wheel"); }

    // header: badge + game name + source tag (CHAT vs REDEEM — one card style,
    // the tag is the only difference between a typed game and a redeemed one).
    var head = makeEl("div", "cg-head");
    head.appendChild(makeEl("span", "cg-badge", CG_ICON[ev.game] || "✦"));
    head.appendChild(makeEl("span", "cg-game", ev.title || (ev.game || "GAME").toUpperCase()));
    head.appendChild(makeEl("span", "cg-tag", ev.source === "redeem" ? "REDEEM" : "CHAT"));
    card.appendChild(head);

    // onLanded fires when the spin/suspense SETTLES: clear the suspense state,
    // mark the card settled (reveals deferred amount), and apply the win/loss
    // accent so the color flips exactly as the result resolves.
    function onLanded() {
      card.classList.remove("cg-suspense");
      card.classList.add("cg-settled");
      applyOutcomeClass(card, ev);
    }

    var body;
    if (ev.game === "slots")      { body = buildSlotsBody(ev, detail, onLanded); }
    else if (ev.game === "wheel") { body = buildWheelBody(ev, detail, onLanded); }
    else                          { body = buildResultBody(ev, detail, onLanded); }
    // A card that PLAYS OUT (spins/suspense) starts in the suspense state; its
    // win/loss accent + amount reveal are deferred to onLanded. A card with nothing
    // to resolve (open-phase raffle/trivia) already had onLanded run synchronously.
    var animates = spinning || body._animates;
    if (animates && !card.classList.contains("cg-settled")) {
      card.classList.add("cg-suspense");
    }
    card.appendChild(body);

    // trivia footer: the winning answer (result phase) or the question (a redeem
    // that just surfaced the prompt — open phase). Never label a question "Answer".
    if (ev.game === "trivia" && detail.answer) {
      var label = (detail.phase === "open") ? "Q: " : "Answer: ";
      card.appendChild(makeEl("div", "cg-sub", label + detail.answer));
    }

    // Hold: any card that PLAYS OUT (spin or suspense) must stay on screen for the
    // ~3s animation PLUS a readable post-land window. The server's duration_ms is
    // the post-announce hold; for an animating card we add SPIN_MS so the
    // land/settle + reveal are fully visible.
    var hold = num(ev.duration_ms, CG_HOLD_MS);
    if (animates) { hold = SPIN_MS + Math.max(hold, 2500); }
    pushCard(card, hold);
  }

  // Speak-redeem card: same bottom-left card language; a speaker icon + the
  // viewer + the spoken quote. The team variant gets a cool-blue accent.
  function renderSpeech(ev) {
    if (!chatGamesEl) { return; }
    var team = ev.bus === "team";
    var card = makeEl("div", "cg-card cg-speech");
    if (team) { card.classList.add("cg-team"); }

    var head = makeEl("div", "cg-head");
    head.appendChild(makeEl("span", "cg-badge", "🗣"));
    head.appendChild(makeEl("span", "cg-game", team ? "SPEAK · TEAM" : "ULTRON SPEAKS"));
    head.appendChild(makeEl("span", "cg-tag", "REDEEM"));
    card.appendChild(head);

    var body = makeEl("div", "cg-body");
    body.appendChild(makeEl("div", "cg-icon", team ? "📡" : "💬"));
    var main = makeEl("div", "cg-main");
    main.appendChild(makeEl("div", "cg-viewer", ev.viewer));
    main.appendChild(makeEl("div", "cg-quote", ev.text));
    body.appendChild(main);
    card.appendChild(body);

    pushCard(card, num(ev.duration_ms, CG_HOLD_MS));
  }

  // Queue: append at the END of column-reverse so the newest renders at the
  // bottom; cap visible cards (oldest dismissed first); auto-dismiss each.
  function pushCard(card, holdMs) {
    chatGamesEl.appendChild(card);
    var rec = { el: card, hideTimer: null, removeTimer: null };
    cgCards.push(rec);
    // slide+fade in on the next frame.
    window.requestAnimationFrame(function () {
      window.requestAnimationFrame(function () { card.classList.add("cg-in"); });
    });
    // over the cap -> dismiss the oldest immediately.
    while (cgCards.length > CG_MAX_VISIBLE) {
      dismissCard(cgCards[0]);
    }
    rec.hideTimer = window.setTimeout(function () { dismissCard(rec); }, Math.max(0, holdMs));
  }

  function dismissCard(rec) {
    if (!rec || rec._dismissed) { return; }
    rec._dismissed = true;
    if (rec.hideTimer) { window.clearTimeout(rec.hideTimer); rec.hideTimer = null; }
    var idx = cgCards.indexOf(rec);
    if (idx >= 0) { cgCards.splice(idx, 1); }
    rec.el.classList.remove("cg-in");
    rec.el.classList.add("cg-out");
    rec.removeTimer = window.setTimeout(function () {
      if (rec.el && rec.el.parentNode) { rec.el.parentNode.removeChild(rec.el); }
    }, CG_OUT_MS);
  }

  function dispatch(ev) {
    if (!ev || typeof ev !== "object") { return; }
    switch (ev.type) {
      case "wheel":     renderWheel(ev);     break;
      case "alert":     renderAlert(ev);     break;
      case "ticker":    renderTicker(ev);    break;
      case "chat_game": renderChatGame(ev);  break;
      case "speech":    renderSpeech(ev);    break;
      default: /* unknown type -> ignore (the server already rejects these) */ break;
    }
  }

  // --- SSE wiring ----------------------------------------------------------
  // Robust reconnect: EventSource auto-retries a TRANSIENT drop on its own, but if
  // the stream is hard-CLOSED (server restart / connection fully torn down /
  // proxy/CEF gives up) it stays dead. We watch for that and re-open with a small
  // bounded backoff so a freshly-rebooted server (or an OBS source that lost the
  // stream) reconnects without a manual refresh. The server replays its recent
  // ring buffer to every new connection, so a card fired during the gap still shows.
  var RECONNECT_MIN_MS = 1000;
  var RECONNECT_MAX_MS = 15000;
  var reconnectDelay = RECONNECT_MIN_MS;
  var reconnectTimer = null;
  var currentSrc = null;

  function scheduleReconnect() {
    if (reconnectTimer) { return; }            // a reconnect is already pending
    reconnectTimer = window.setTimeout(function () {
      reconnectTimer = null;
      connect();
    }, reconnectDelay);
    // exponential backoff, capped — avoids hammering a server that stays down.
    reconnectDelay = Math.min(reconnectDelay * 2, RECONNECT_MAX_MS);
  }

  function connect() {
    var token = new URLSearchParams(window.location.search).get("token") || "";
    // Tear down any prior stream before opening a fresh one (idempotent reconnect).
    if (currentSrc) {
      try { currentSrc.close(); } catch (err) { /* already closed */ }
      currentSrc = null;
    }
    var src;
    try {
      src = new EventSource("/events?token=" + encodeURIComponent(token));
    } catch (err) {
      // Construction itself failed (rare) -> back off and retry rather than die.
      scheduleReconnect();
      return;
    }
    currentSrc = src;

    function onMessage(e) {
      var parsed;
      try { parsed = JSON.parse(e.data); }
      catch (err) { return; } // malformed frame -> drop, never throw
      dispatch(parsed);
    }

    src.addEventListener("open", function () {
      // A clean (re)connection resets the backoff so the NEXT drop retries fast.
      reconnectDelay = RECONNECT_MIN_MS;
    });

    // Named SSE event ("event: overlay") AND the default message event.
    src.addEventListener("overlay", onMessage);
    src.addEventListener("message", onMessage);
    src.addEventListener("error", function () {
      // readyState CONNECTING (0) -> EventSource is auto-retrying; leave it alone.
      // readyState CLOSED (2)     -> the stream is dead; re-open it ourselves.
      if (src.readyState === EventSource.CLOSED) {
        try { src.close(); } catch (err) { /* already closed */ }
        if (currentSrc === src) { currentSrc = null; }
        scheduleReconnect();
      }
    });
  }

  // --- DEMO / PREVIEW mode -------------------------------------------------
  // Append ?demo=1 to the overlay URL to cycle a sample of EVERY chat-game card
  // every few seconds WITHOUT any live game / SSE connection. Lets the streamer
  // dial in the look in OBS first. Runs purely client-side; no network.
  var DEMO_DECK = [
    // lead with the big spinning wheel (the streamer's exact SMALL WIN shape) so
    // the preview showcases the ~3s spin -> land -> amount-on-wedge reveal first.
    { type: "chat_game", game: "wheel", title: "WHEEL", viewer: "spinner_one", outcome: "SMALL WIN",
      won: true, amount: 50, detail: { segment: "SMALL WIN", payout: 50 }, duration_ms: 7000 },
    { type: "chat_game", game: "slots", title: "SLOTS", viewer: "shroud_fan", outcome: "WIN",
      won: true, amount: 9000, detail: { reels: ["seven", "seven", "seven"], win_symbol: "seven" } },
    { type: "chat_game", game: "slots", title: "SLOTS", viewer: "whiffmaster", outcome: "LOSS",
      won: false, amount: -250, detail: { reels: ["cherry", "lemon", "bell"] } },
    { type: "chat_game", game: "wheel", title: "WHEEL", viewer: "tarik_2026", outcome: "JACKPOT 1000",
      won: true, amount: 1000, detail: { segment: "JACKPOT 1000", payout: 1000 } },
    { type: "chat_game", game: "heist", title: "HEIST", viewer: "crewlead", outcome: "WIN",
      won: true, amount: 420, detail: { pot: 1500, crew: 6, payout: 420 } },
    { type: "chat_game", game: "heist", title: "HEIST", viewer: "crewlead", outcome: "FAIL",
      won: false, amount: 1500, detail: { pot: 1500, crew: 6, payout: 0 } },
    { type: "chat_game", game: "duel", title: "DUEL", viewer: "aimgod", outcome: "WIN",
      won: true, amount: 600, detail: { winner: "aimgod", loser: "spray_n_pray", wager: 300 } },
    { type: "chat_game", game: "trivia", title: "TRIVIA", viewer: "lore_keeper", outcome: "WINNER",
      won: true, amount: 100, detail: { winner: "lore_keeper", answer: "Killjoy" } },
    { type: "chat_game", game: "raffle", title: "RAFFLE", viewer: "lucky_one", outcome: "WINNER",
      won: true, amount: 500, detail: { winner: "lucky_one", entrants: 38 } },
    // --- channel-point REDEEM cards (same card language, REDEEM tag) ---------
    { type: "chat_game", game: "slots", title: "SLOTS", viewer: "redeemer_99", outcome: "WIN",
      source: "redeem", won: true, amount: 500,
      detail: { reels: ["bell", "bell", "bell"], win_symbol: "bell", payout: 500 } },
    { type: "chat_game", game: "wheel", title: "WHEEL", viewer: "pointspender", outcome: "DOUBLE",
      source: "redeem", won: true, amount: 200, detail: { segment: "DOUBLE", payout: 200 } },
    { type: "chat_game", game: "heist", title: "HEIST", viewer: "soloheist", outcome: "PARTIAL",
      source: "redeem", won: true, amount: 50, detail: { pot: 100, crew: 1, payout: 50 } },
    { type: "chat_game", game: "duel", title: "DUEL", viewer: "challenger", outcome: "WIN",
      source: "redeem", won: true, amount: 100,
      detail: { winner: "challenger", loser: "the house", wager: 100 } },
    // --- SPEAK redeems ------------------------------------------------------
    { type: "speech", bus: "say", viewer: "chatty_cathy",
      text: "GG everyone, that clutch was insane — Ultron carried the comms." },
    { type: "speech", bus: "team", viewer: "igl_brain",
      text: "Relaying from chat: rotate B now, they over-committed to A." }
  ];

  // Games that PLAY OUT for ~3s before settling (so the demo paces them with room
  // to watch the resolve). Open-phase raffle/trivia settle instantly -> short gap.
  function demoAnimates(ev) {
    if (!ev || ev.type !== "chat_game") { return false; }
    if (ev.game === "slots" || ev.game === "wheel") { return true; }
    var phase = (ev.detail && ev.detail.phase) || "result";
    if ((ev.game === "raffle" || ev.game === "trivia") && phase === "open") { return false; }
    return ev.game === "heist" || ev.game === "duel" || ev.game === "raffle" || ev.game === "trivia";
  }

  function startDemo() {
    var i = 0;
    function step() {
      var ev = DEMO_DECK[i % DEMO_DECK.length];
      dispatch(ev);
      i++;
      // An animating game takes ~3s to settle; give it extra room so the
      // play-out -> settle -> amount reveal is fully visible before the next card.
      var gap = demoAnimates(ev) ? 4600 : 3200;
      window.setTimeout(step, gap);
    }
    step();
  }

  function init() {
    var params = new URLSearchParams(window.location.search);
    if (params.get("demo") === "1") {
      startDemo();   // standalone preview: no SSE, just cycle the sample deck
      return;
    }
    connect();
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
